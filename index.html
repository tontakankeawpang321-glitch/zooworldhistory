<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แกลอรีสารคดี (Documentary Gallery)</title>
    <!-- ใช้ Tailwind CSS สำหรับการออกแบบ UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* สไตล์สำหรับซ่อน/แสดง Modal ด้วยเอฟเฟกต์เฟด */
        .modal-enter {
            opacity: 0;
            pointer-events: none;
        }
        .modal-enter-active {
            opacity: 1;
            pointer-events: auto;
            transition: opacity 0.3s ease-out;
        }
        .modal-scale-enter {
            transform: scale(0.95);
        }
        .modal-scale-enter-active {
            transform: scale(1);
            transition: transform 0.3s ease-out;
        }
        
        body.modal-open {
            overflow: hidden;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* สไตล์หัวใจเวลาถูกเลือก */
        .fav-active {
            color: #ef4444; /* red-500 */
            fill: currentColor;
        }
    </style>
</head>
<body class="text-gray-100 font-sans min-h-screen relative pb-20"> <!-- เผื่อที่ให้ Bottom Nav -->

    <!-- พื้นหลังธรรมชาติสว่างที่โล่ง และ เงากระจกกึ่งโปร่งแสง (Frosted Glass) -->
    <div class="fixed inset-0 z-[-1] bg-[url('https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&q=80&w=2560')] bg-cover bg-center">
        <!-- ปรับความดำให้ลดลง (bg-black/40) และเพิ่มความเบลอ (backdrop-blur-xl) เพื่อให้สีสว่างๆ ทะลุขึ้นมา -->
        <div class="absolute inset-0 bg-black/40 backdrop-blur-xl shadow-inner"></div>
    </div>

    <!-- ส่วนหัว (Header) -->
    <header class="bg-gradient-to-b from-black/95 to-transparent fixed top-0 w-full z-40 transition-all duration-300 pb-2 sm:pb-4">
        <div class="w-full px-4 sm:px-8 py-3 flex flex-wrap sm:flex-nowrap items-center justify-between gap-3">
            <h1 class="text-xl sm:text-3xl font-bold flex items-center gap-2 drop-shadow-lg text-white">
                <svg class="w-6 h-6 sm:w-8 sm:h-8 text-red-600" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4zM15 16H5V8h10v8z"/>
                </svg>
                DOCU<span class="text-gray-400 font-light">GALLERY</span>
            </h1>
            
            <!-- กล่องค้นหา -->
            <div class="relative w-full sm:w-64 md:w-80 order-3 sm:order-none mt-2 sm:mt-0">
                <svg class="w-5 h-5 absolute left-3 top-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="search-input" placeholder="ค้นหาสารคดี..." class="w-full bg-gray-800/80 text-white px-4 py-2 pl-10 rounded-full border border-gray-700/50 focus:outline-none focus:border-red-600 focus:bg-gray-900 text-sm backdrop-blur-sm transition-colors shadow-inner">
            </div>

            <!-- กลุ่มปุ่มด้านบนขวา: Status, Refresh, Favorites -->
            <div class="flex items-center gap-2">
                <div id="data-status" class="hidden sm:block text-[10px] sm:text-sm px-3 py-1.5 rounded bg-gray-800/80 text-gray-300 backdrop-blur-sm border border-gray-700/50 whitespace-nowrap">
                    กำลังโหลด...
                </div>
                
                <!-- ปุ่ม Refresh -->
                <button onclick="refreshData()" class="p-2 bg-gray-800/80 border border-gray-700/50 rounded-full hover:bg-gray-700 transition-colors backdrop-blur-sm text-gray-300 hover:text-white" title="รีเฟรชข้อมูล">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>

                <!-- ปุ่มรายการโปรด (Top) -->
                <button onclick="openFavoritesModal()" class="p-2 bg-gray-800/80 border border-gray-700/50 rounded-full hover:bg-gray-700 transition-colors backdrop-blur-sm text-gray-300 hover:text-white" title="รายการโปรด">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- คอนเทนต์หลัก -->
    <main class="w-full mx-auto pt-36 sm:pt-24 pb-12">
        
        <!-- แถบหมวดหมู่ (Category Bar / ชุดสารคดี) -->
        <div id="category-bar" class="flex overflow-x-auto hide-scrollbar gap-2 px-4 sm:px-8 mb-6 pb-2">
            <!-- ปุ่มหมวดหมู่จะถูกสร้างด้วย JS -->
        </div>

        <!-- ส่วนที่ 1: สไลเดอร์ คลิปล่าสุด -->
        <section id="slider-section" class="mb-10 relative group">
            <h2 class="text-lg sm:text-xl font-bold mb-3 px-4 sm:px-8 flex items-center gap-2 text-white">
                คลิปล่าสุด
            </h2>
            <button onclick="scrollSlider(-1)" class="hidden md:flex absolute left-0 top-1/2 -translate-y-1/2 z-30 bg-black/60 hover:bg-black/90 text-white w-12 h-full items-center justify-center transition-all focus:outline-none opacity-0 group-hover:opacity-100">
                <svg class="w-8 h-8 transform -translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div id="slider-container" class="flex overflow-x-auto snap-x snap-mandatory gap-0 hide-scrollbar scroll-smooth px-0 sm:px-8">
                <!-- การ์ดสไลเดอร์ -->
            </div>
            <button onclick="scrollSlider(1)" class="hidden md:flex absolute right-0 top-1/2 -translate-y-1/2 z-30 bg-black/60 hover:bg-black/90 text-white w-12 h-full items-center justify-center transition-all focus:outline-none opacity-0 group-hover:opacity-100">
                <svg class="w-8 h-8 transform translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </section>

        <!-- ส่วนที่ 2: สารคดีที่เหลือ -->
        <section id="remaining-section" style="display: none;" class="px-0 sm:px-8">
            <h2 id="grid-title" class="text-lg sm:text-xl font-bold mb-3 px-4 sm:px-0 text-gray-400">
                สารคดีทั้งหมด
            </h2>
            <div id="gallery-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-0">
                <!-- การ์ดที่เหลือ -->
            </div>
            <div id="pagination-container" class="flex justify-center items-center gap-2 mt-8 pb-4">
                <!-- Pagination -->
            </div>
        </section>
    </main>

    <!-- แถบเมนูด้านล่าง (Bottom Navigation แบบ App) -->
    <nav class="fixed bottom-0 w-full bg-black/90 backdrop-blur-xl border-t border-gray-800 z-40 flex justify-around py-3 px-2 shadow-[0_-10px_20px_rgba(0,0,0,0.5)]">
        <button onclick="goHome()" class="flex flex-col items-center gap-1 text-white hover:text-red-500 transition-colors flex-1">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[10px] font-medium">หน้าแรก</span>
        </button>
        <button onclick="openFavoritesModal()" class="flex flex-col items-center gap-1 text-gray-400 hover:text-red-500 transition-colors flex-1">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
            <span class="text-[10px] font-medium">รายการโปรด</span>
        </button>
    </nav>

    <!-- โครงสร้าง Dialog/Modal สำหรับเล่นวิดีโอ -->
    <div id="video-modal" class="fixed inset-0 z-50 flex items-center justify-center modal-enter" aria-modal="true" role="dialog">
        <div class="absolute inset-0 bg-black bg-opacity-90 backdrop-blur-sm" onclick="closeModal()"></div>
        <div id="modal-content" class="relative bg-gray-900 rounded-xl overflow-hidden shadow-2xl w-full max-w-5xl mx-0 sm:mx-4 modal-scale-enter border border-gray-800 h-full sm:h-auto flex flex-col">
            
            <!-- ส่วนหัว Modal -->
            <div class="flex justify-between items-center p-3 sm:p-4 border-b border-gray-800 bg-black">
                <h2 id="modal-title" class="text-base sm:text-xl font-semibold text-white truncate pr-4 flex-1">ชื่อสารคดี</h2>
                
                <div class="flex items-center gap-2">
                    <!-- ปุ่มรายการโปรดใน Modal -->
                    <button id="modal-fav-btn" onclick="toggleFavoriteFromModal()" class="text-gray-400 hover:text-red-500 transition-colors p-2 rounded-full hover:bg-gray-800" aria-label="เพิ่มลงรายการโปรด">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                    </button>
                    <!-- ปุ่มปิด -->
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors p-2 bg-gray-800 hover:bg-gray-700 rounded-full" aria-label="ปิด">
                        <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            </div>
            
            <!-- คอนเทนเนอร์วิดีโอ (ใช้ div เปล่าสำหรับ YouTube API) -->
            <div class="relative w-full bg-black flex-shrink-0" style="padding-top: 56.25%;">
                <div id="yt-player-container" class="absolute top-0 left-0 w-full h-full"></div>
            </div>
            
            <!-- คำอธิบายด้านล่างวิดีโอ -->
            <div class="p-4 sm:p-6 bg-gray-900 text-gray-300 text-sm sm:text-base overflow-y-auto flex-1">
                <p id="modal-description" class="mb-4">รายละเอียดสารคดี...</p>
                <div class="flex items-center text-xs text-gray-500 gap-2 border-t border-gray-800 pt-4 mt-auto">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
                    เล่นอัตโนมัติเมื่อจบ (Auto-play Next)
                </div>
            </div>
        </div>
    </div>

    <!-- โครงสร้าง Dialog/Modal สำหรับ "รายการโปรด" -->
    <div id="fav-modal" class="fixed inset-0 z-50 flex items-center justify-center modal-enter" aria-modal="true" role="dialog">
        <div class="absolute inset-0 bg-black bg-opacity-90 backdrop-blur-sm" onclick="closeFavoritesModal()"></div>
        <div id="fav-modal-content" class="relative bg-gray-900 rounded-xl overflow-hidden shadow-2xl w-full max-w-6xl mx-0 sm:mx-4 modal-scale-enter border border-gray-800 h-[90vh] flex flex-col">
            
            <div class="flex justify-between items-center p-4 border-b border-gray-800 bg-black">
                <h2 class="text-xl font-bold text-white flex items-center gap-2">
                    <svg class="w-6 h-6 text-red-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    รายการโปรดของคุณ
                </h2>
                <button onclick="closeFavoritesModal()" class="text-gray-400 hover:text-white p-2 bg-gray-800 hover:bg-gray-700 rounded-full">
                    <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-0 overflow-y-auto flex-1 bg-black/50">
                <div id="fav-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-0">
                    <!-- การ์ดรายการโปรดจะมาแสดงตรงนี้ -->
                </div>
            </div>
        </div>
    </div>

    <!-- โหลด YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // --- ตัวแปรสำหรับวิดีโอตัวอย่าง ---
        let isYTReady = false;
        let previewPlayer = null;
        let previewTimeout = null;
        let currentPreviewDoc = null;

        // ฟังก์ชัน Callback ของ YouTube IFrame API ทำงานเมื่อ API โหลดเสร็จ
        function onYouTubeIframeAPIReady() {
            isYTReady = true;
            startPreviewPlayer();
        }

        // --- 1. ข้อมูลจำลอง (Mock Data) ---
        const mockData = [
            { id: "1", category: "ธรรมชาติ", title: "โลกของเรา (Our Planet)", description: "สำรวจความมหัศจรรย์ของธรรมชาติและสัตว์ป่าหลากหลายสายพันธุ์ทั่วโลก", thumbnail: "https://images.unsplash.com/photo-1543196614-e046c7d3d82e?auto=format&fit=crop&q=80&w=800", videoUrl: "https://www.youtube.com/embed/GfO-HzE1I18" },
            { id: "2", category: "ใต้ทะเล", title: "ความลับใต้ทะเลลึก (Deep Blue)", description: "ดำดิ่งลงสู่ก้นมหาสมุทรเพื่อค้นพบสิ่งมีชีวิตประหลาดที่ไม่เคยมีใครเห็นมาก่อน", thumbnail: "https://images.unsplash.com/photo-1582967788606-a171c1080cb0?auto=format&fit=crop&q=80&w=800", videoUrl: "https://www.youtube.com/embed/uw_Z2B0O5m8" },
            { id: "3", category: "อวกาศ", title: "จักรวาลอันกว้างใหญ่ (Cosmos)", description: "การเดินทางผ่านดวงดาว กาแล็กซี และหลุมดำ เพื่อหาคำตอบของจุดกำเนิดจักรวาล", thumbnail: "https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&q=80&w=800", videoUrl: "https://www.youtube.com/embed/libKVRa01L8" },
            { id: "4", category: "ธรรมชาติ", title: "ป่าฝนแอมะซอน (The Amazon)", description: "สารคดีตามติดชีวิตสัตว์ป่าในปอดของโลกที่มีความหลากหลายทางชีวภาพมากที่สุด", thumbnail: "https://images.unsplash.com/photo-1518182170546-076616fdcbdd?auto=format&fit=crop&q=80&w=800", videoUrl: "https://www.youtube.com/embed/JkaxUblCGz0" },
            { id: "5", category: "สัตว์ป่า", title: "ผู้ล่าแห่งทุ่งหญ้าสะวันนา (Predators)", description: "ติดตามชีวิตของสิงโต เสือดาว และชีตาห์ ในการเอาชีวิตรอดและล่าเหยื่อ", thumbnail: "https://images.unsplash.com/photo-1517825738774-7de9363ef735?auto=format&fit=crop&q=80&w=800", videoUrl: "https://www.youtube.com/embed/c8jE2mZMA1Q" },
            { id: "6", category: "ธรรมชาติ", title: "ขั้วโลกน้ำแข็ง (Frozen Worlds)", description: "ความท้าทายของสิ่งมีชีวิตในสภาพอากาศที่หนาวเหน็บที่สุดในโลก", thumbnail: "https://images.unsplash.com/photo-1518205739023-7a91512db16b?auto=format&fit=crop&q=80&w=800", videoUrl: "https://www.youtube.com/embed/cVT2zX-1f7Y" },
            { id: "7", category: "สัตว์ป่า", title: "นกผู้โบยบิน (Birds of Prey)", description: "สารคดีความงามของนกนักล่าและเทคนิคการบินอันน่าทึ่ง", thumbnail: "https://images.unsplash.com/photo-1550853024-fae8d418ebce?auto=format&fit=crop&q=80&w=800", videoUrl: "https://www.youtube.com/embed/1B4m-d0_M9A" },
            { id: "8", category: "ธรรมชาติ", title: "ภูเขาไฟปะทุ (Volcanoes)", description: "พลังงานธรรมชาติที่ทำลายล้างและสร้างสรรค์แผ่นดินใหม่", thumbnail: "https://images.unsplash.com/photo-1465101162946-4377e57745c3?auto=format&fit=crop&q=80&w=800", videoUrl: "https://www.youtube.com/embed/VNGUvwCSHRk" },
            { id: "9", category: "สัตว์ป่า", title: "ชีวิตแมลง (Micro Monsters)", description: "โลกใบเล็กที่ซ่อนอยู่ใต้ฝ่าเท้าของเราและการต่อสู้เพื่อเอาชีวิตรอด", thumbnail: "https://images.unsplash.com/photo-1518833904452-942629bbf930?auto=format&fit=crop&q=80&w=800", videoUrl: "https://www.youtube.com/embed/XqE6b5k_w08" },
            { id: "10", category: "ประวัติศาสตร์", title: "เทือกเขาหิมาลัย (The Himalayas)", description: "ชีวิตบนหลังคาโลกและความศรัทธาของผู้คนที่อาศัยอยู่", thumbnail: "https://images.unsplash.com/photo-1454496522488-7a8e488e8606?auto=format&fit=crop&q=80&w=800", videoUrl: "https://www.youtube.com/embed/xL2x0Bnt15k" }
        ];

        let documentaries = [];
        let currentPlaylist = []; 
        let currentDocId = null;  

        // ตัวแปรสถานะ
        let searchQuery = "";
        let currentCategory = "ทั้งหมด";
        let categoriesList = ["ทั้งหมด"];
        let currentPage = 1;
        const itemsPerPage = 10;
        let autoSlideTimer = null;
        
        let ytPlayer = null;

        // --- 2. โหลดข้อมูล ---
        async function loadData() {
            const statusEl = document.getElementById('data-status');
            try {
                const response = await fetch('data.csv');
                if (!response.ok) throw new Error('No CSV');
                const csvText = await response.text();
                documentaries = parseCSV(csvText);
                statusEl.textContent = 'CSV Data';
                statusEl.className = 'hidden sm:block text-[10px] sm:text-sm px-3 py-1.5 rounded bg-green-900/80 text-green-300 backdrop-blur-sm border border-green-700/50';
            } catch (error) {
                documentaries = mockData;
                statusEl.textContent = 'Mock Data';
                statusEl.className = 'hidden sm:block text-[10px] sm:text-sm px-3 py-1.5 rounded bg-yellow-900/80 text-yellow-300 backdrop-blur-sm border border-yellow-700/50';
            }
            
            extractCategories(); 
            renderAll();
        }

        function extractCategories() {
            const cats = new Set(documentaries.map(d => d.category && d.category.trim() ? d.category.trim() : 'อื่นๆ'));
            categoriesList = ["ทั้งหมด", ...Array.from(cats)];
            renderCategoryBar();
        }

        function renderCategoryBar() {
            const bar = document.getElementById('category-bar');
            if (!bar) return;
            bar.innerHTML = categoriesList.map(cat => `
                <button onclick="setCategory('${cat}')" class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors border border-gray-700/50 ${currentCategory === cat ? 'bg-red-600 text-white border-red-500 shadow-[0_0_10px_rgba(239,68,68,0.3)]' : 'bg-gray-800/80 text-gray-300 hover:bg-gray-700 backdrop-blur-sm'}">
                    ${cat}
                </button>
            `).join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            currentPage = 1;
            renderCategoryBar();
            renderAll();
        }

        function refreshData() {
            document.getElementById('search-input').value = "";
            searchQuery = "";
            currentCategory = "ทั้งหมด";
            currentPage = 1;
            loadData();
        }

        function goHome() {
            closeFavoritesModal();
            closeModal();
            currentCategory = "ทั้งหมด";
            renderCategoryBar();
            renderAll();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function parseCSV(str) {
            const lines = str.trim().split('\n');
            if (lines.length < 2) return mockData;
            const headers = lines[0].split(',').map(h => h.trim());
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const values = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || lines[i].split(','); 
                const obj = {};
                headers.forEach((header, index) => {
                    let val = values[index] ? values[index].trim() : '';
                    if (val.startsWith('"') && val.endsWith('"')) val = val.substring(1, val.length - 1);
                    obj[header] = val;
                });
                
                if (!obj.videoUrl || obj.videoUrl.trim() === '') {
                    obj.videoUrl = "https://www.youtube.com/embed/GfO-HzE1I18"; 
                }
                
                if (!obj.thumbnail || obj.thumbnail.trim() === '') {
                    obj.thumbnail = "https://images.unsplash.com/photo-1543196614-e046c7d3d82e?auto=format&fit=crop&q=80&w=800";
                }

                data.push(obj);
            }
            return data;
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            currentPage = 1;
            renderAll();
        });

        // --- 3. ฟังก์ชัน Render ---
        function renderAll() {
            const sliderSection = document.getElementById('slider-section');
            const gridTitle = document.getElementById('grid-title');
            
            let filteredDocs = documentaries;

            if (currentCategory !== "ทั้งหมด") {
                filteredDocs = filteredDocs.filter(doc => (doc.category || 'อื่นๆ').trim() === currentCategory);
            }

            if (searchQuery) {
                filteredDocs = filteredDocs.filter(doc => 
                    doc.title.toLowerCase().includes(searchQuery) || 
                    doc.description.toLowerCase().includes(searchQuery)
                );
            }

            if (searchQuery || currentCategory !== "ทั้งหมด") {
                sliderSection.style.display = 'none';
                currentPreviewDoc = null; // ปิดระบบ preview ถ้าค้นหาอยู่
                
                if (searchQuery) {
                    gridTitle.textContent = `ผลการค้นหา: "${searchQuery}" (${filteredDocs.length} รายการ)`;
                } else {
                    gridTitle.textContent = `ชุดสารคดี: ${currentCategory} (${filteredDocs.length} รายการ)`;
                }
                
                renderGrid(filteredDocs, filteredDocs); 
            } else {
                sliderSection.style.display = 'block';
                gridTitle.textContent = 'สารคดีทั้งหมด';
                
                const latestDocs = documentaries.slice(0, 5);
                const remainingDocs = documentaries.slice(5);

                currentPreviewDoc = latestDocs.length > 0 ? latestDocs[0] : null;

                renderSlider(latestDocs, documentaries); 
                renderGrid(remainingDocs, documentaries);
                startAutoSlide();
                
                // ให้เวลา DOM โหลดโครงสร้างก่อนเรียกใช้ตัวเล่น
                setTimeout(startPreviewPlayer, 100);
            }
        }

        // จัดเก็บข้อมูล Playlist และเช็ค Index เพื่อสร้างกล่องวิดีโอตัวอย่าง
        function createCardHTML(doc, playlistJson, isSlider = false, index = -1) {
            const wrapperClass = isSlider 
                ? "flex-none w-[85vw] sm:w-[320px] md:w-[400px] lg:w-[480px] snap-start relative aspect-video cursor-pointer group overflow-hidden bg-gray-900 border-r border-black"
                : "w-full relative aspect-video cursor-pointer group overflow-hidden bg-gray-900 border border-black"; 

            const isFav = isFavorite(doc.id);
            const favBadge = isFav ? `<div class="absolute top-2 left-2 z-40 text-red-500 drop-shadow-md"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>` : '';

            // ตรวจสอบเพื่อสร้างพื้นที่เล่นวิดีโอตัวอย่างบนการ์ดใบแรก
            const isFirstSlider = isSlider && index === 0;
            const thumbIdAttr = isFirstSlider ? `id="preview-thumbnail"` : '';
            // scale-150 และ translate เพื่อช่วยซ่อนขอบของ youtube iframe ไม่ให้รบกวนสายตา
            const previewContainer = isFirstSlider ? `<div id="preview-player-container" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[150%] h-[150%] z-0 pointer-events-none"></div>` : '';

            const encodedDoc = encodeURIComponent(JSON.stringify(doc));
            const encodedPlaylist = encodeURIComponent(JSON.stringify(playlistJson));

            return `
                <div class="${wrapperClass}" onclick="openModalFromEncoded('${encodedDoc}', '${encodedPlaylist}')">
                    ${favBadge}
                    
                    ${previewContainer}
                    <img ${thumbIdAttr} src="${doc.thumbnail}" alt="${doc.title}" class="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-700 z-10" loading="lazy">
                    
                    <div class="absolute inset-0 bg-gradient-to-t from-black/95 via-black/40 to-transparent z-20 pointer-events-none"></div>
                    
                    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-30">
                        <div class="bg-white/10 backdrop-blur-sm rounded-full p-3 shadow-[0_0_20px_rgba(0,0,0,0.5)] transform scale-75 group-hover:scale-100 transition-transform duration-300 border border-white/20">
                            <svg class="w-8 h-8 text-white ml-1 drop-shadow-lg" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    
                    ${isSlider ? '<span class="absolute top-2 right-2 bg-red-600 text-white text-[9px] sm:text-xs px-2 py-0.5 rounded-sm font-bold shadow-lg z-30 tracking-widest">NEW</span>' : ''}
                    
                    <div class="absolute bottom-0 left-0 right-0 p-3 sm:p-5 z-40 transform translate-y-2 sm:translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
                        <h3 class="text-sm sm:text-lg lg:text-xl font-bold text-white mb-1 drop-shadow-md line-clamp-1">${doc.title}</h3>
                        <p class="text-gray-300 text-[10px] sm:text-xs lg:text-sm line-clamp-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300 delay-75">${doc.description}</p>
                    </div>
                </div>
            `;
        }

        function renderSlider(docs, fullPlaylist) {
            const slider = document.getElementById('slider-container');
            if(docs.length === 0) {
                slider.innerHTML = '<p class="text-gray-500 w-full text-center">ไม่มีข้อมูล</p>';
                return;
            }
            slider.innerHTML = docs.map((doc, idx) => createCardHTML(doc, fullPlaylist, true, idx)).join('');
        }

        function renderGrid(docs, fullPlaylist) {
            const gridSection = document.getElementById('remaining-section');
            const grid = document.getElementById('gallery-grid');
            
            if(docs.length > 0) {
                gridSection.style.display = 'block';
                const startIndex = (currentPage - 1) * itemsPerPage;
                const endIndex = startIndex + itemsPerPage;
                const paginatedDocs = docs.slice(startIndex, endIndex);
                
                grid.innerHTML = paginatedDocs.map((doc, idx) => createCardHTML(doc, fullPlaylist, false, idx)).join('');
                renderPagination(docs.length);
            } else {
                gridSection.style.display = 'block';
                grid.innerHTML = '<div class="col-span-full flex justify-center py-20 text-gray-500"><p class="text-lg">ไม่พบสารคดีที่คุณค้นหา</p></div>';
                document.getElementById('pagination-container').innerHTML = '';
            }
        }

        function renderPagination(totalItems) {
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const container = document.getElementById('pagination-container');
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            let html = `<button onclick="changePage(${currentPage - 1})" class="px-3 py-1.5 bg-gray-900 border border-gray-700 text-white rounded hover:bg-red-600 disabled:opacity-30" ${currentPage === 1 ? 'disabled' : ''}>&laquo;</button>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<button onclick="changePage(${i})" class="px-3 py-1.5 border border-gray-700 rounded ${currentPage === i ? 'bg-red-600 text-white font-bold' : 'bg-gray-900 text-gray-400 hover:bg-gray-700 hover:text-white'}">${i}</button>`;
            }
            html += `<button onclick="changePage(${currentPage + 1})" class="px-3 py-1.5 bg-gray-900 border border-gray-700 text-white rounded hover:bg-red-600 disabled:opacity-30" ${currentPage === totalPages ? 'disabled' : ''}>&raquo;</button>`;
            container.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            renderAll();
            document.getElementById('remaining-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
            setTimeout(() => window.scrollBy(0, -100), 50); 
        }

        function scrollSlider(direction) {
            const container = document.getElementById('slider-container');
            const itemWidth = window.innerWidth < 640 ? window.innerWidth * 0.85 : window.innerWidth < 1024 ? 400 : 480;
            container.scrollBy({ left: itemWidth * direction, behavior: 'smooth' });
        }

        function startAutoSlide() {
            if (autoSlideTimer) clearInterval(autoSlideTimer);
            autoSlideTimer = setInterval(() => {
                const container = document.getElementById('slider-container');
                if (!container) return;
                if (Math.ceil(container.scrollLeft + container.clientWidth) >= (container.scrollWidth - 10)) {
                    container.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    scrollSlider(1);
                }
            }, 10000);
        }

        // --- 4. ระบบตัวอย่างวิดีโอ (Preview) ---
        function startPreviewPlayer() {
            if (!isYTReady || !currentPreviewDoc) return;
            const container = document.getElementById('preview-player-container');
            if (!container) return;

            // ลบ Player เดิมก่อนสร้างใหม่
            if (previewPlayer) {
                previewPlayer.destroy();
                previewPlayer = null;
            }

            const videoId = extractYouTubeId(currentPreviewDoc.videoUrl);

            previewPlayer = new YT.Player('preview-player-container', {
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'mute': 1, 
                    'playsinline': 1,
                    'rel': 0,
                    'modestbranding': 1,
                    'showinfo': 0,
                    'disablekb': 1,
                    'fs': 0,
                    'iv_load_policy': 3
                },
                events: {
                    'onReady': (event) => {
                        // เพิ่มบรรทัดนี้เพื่อบังคับปิดเสียงก่อนเล่น เบราว์เซอร์ถึงจะยอมให้เล่นอัตโนมัติ
                        event.target.mute(); 
                        event.target.playVideo();
                    },
                    'onStateChange': (event) => {
                        const thumb = document.getElementById('preview-thumbnail');
                        // 1 = เล่น
                        if (event.data === YT.PlayerState.PLAYING) {
                            if (thumb) thumb.style.opacity = '0'; // เฟดรูปปกทิ้งเพื่อโชว์วิดีโอ
                            
                            clearTimeout(previewTimeout);
                            previewTimeout = setTimeout(() => {
                                if (previewPlayer && previewPlayer.pauseVideo) {
                                    previewPlayer.pauseVideo();
                                    if (thumb) thumb.style.opacity = '0.8'; // เฟดรูปปกกลับมา
                                }
                            }, 5000); // ตั้งเวลา 5 วินาที
                        }
                    }
                }
            });
        }

        // --- 5. ระบบรายการโปรด (Local Storage) ---
        function getFavorites() {
            const favs = localStorage.getItem('documentary_favorites');
            return favs ? JSON.parse(favs) : [];
        }

        function isFavorite(id) {
            return getFavorites().includes(id);
        }

        function toggleFavoriteFromModal() {
            if (!currentDocId) return;
            
            let favs = getFavorites();
            if (favs.includes(currentDocId)) {
                favs = favs.filter(id => id !== currentDocId);
            } else {
                favs.push(currentDocId);
            }
            localStorage.setItem('documentary_favorites', JSON.stringify(favs));
            
            updateModalFavButton();
            renderAll(); 
            
            if (document.getElementById('fav-modal').classList.contains('modal-enter-active')) {
                renderFavoritesDialog();
            }
        }

        function updateModalFavButton() {
            const btn = document.getElementById('modal-fav-btn');
            if (isFavorite(currentDocId)) {
                btn.innerHTML = `<svg class="w-6 h-6 fav-active" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
            } else {
                btn.innerHTML = `<svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>`;
            }
        }

        function openFavoritesModal() {
            renderFavoritesDialog();
            const modal = document.getElementById('fav-modal');
            const modalContent = document.getElementById('fav-modal-content');
            modal.classList.remove('modal-enter');
            modal.classList.add('modal-enter-active');
            modalContent.classList.remove('modal-scale-enter');
            modalContent.classList.add('modal-scale-enter-active');
            document.body.classList.add('modal-open');
        }

        function closeFavoritesModal() {
            const modal = document.getElementById('fav-modal');
            const modalContent = document.getElementById('fav-modal-content');
            modal.classList.remove('modal-enter-active');
            modal.classList.add('modal-enter');
            modalContent.classList.remove('modal-scale-enter-active');
            modalContent.classList.add('modal-scale-enter');
            if (!document.getElementById('video-modal').classList.contains('modal-enter-active')) {
                document.body.classList.remove('modal-open');
            }
        }

        function renderFavoritesDialog() {
            const favIds = getFavorites();
            const favDocs = documentaries.filter(doc => favIds.includes(doc.id));
            const grid = document.getElementById('fav-grid');
            
            if (favDocs.length === 0) {
                grid.innerHTML = '<div class="col-span-full flex flex-col items-center justify-center py-20 text-gray-500"><svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg><p>ยังไม่มีรายการโปรด</p></div>';
            } else {
                grid.innerHTML = favDocs.map((doc, idx) => createCardHTML(doc, favDocs, false, idx)).join('');
            }
        }

        // --- 6. ฟังก์ชันควบคุมการเล่นวิดีโอ (YouTube API) ---
        
        function extractYouTubeId(url) {
            if (!url) return 'GfO-HzE1I18'; 
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : 'GfO-HzE1I18';
        }

        function openModalFromEncoded(encodedDoc, encodedPlaylist) {
            const doc = JSON.parse(decodeURIComponent(encodedDoc));
            const playlist = JSON.parse(decodeURIComponent(encodedPlaylist));
            openModal(doc, playlist);
        }

        function openModal(doc, playlist) {
            if (document.getElementById('fav-modal').classList.contains('modal-enter-active')) {
                closeFavoritesModal();
            }

            // ถ้าพรีวิวตัวอย่างกำลังเล่นอยู่ ให้หยุดก่อนเปิดวิดีโอเต็ม
            if (previewPlayer && previewPlayer.pauseVideo) {
                previewPlayer.pauseVideo();
                const thumb = document.getElementById('preview-thumbnail');
                if(thumb) thumb.style.opacity = '0.8';
            }

            currentDocId = doc.id;
            currentPlaylist = playlist || documentaries;
            
            document.getElementById('modal-title').textContent = doc.title;
            document.getElementById('modal-description').textContent = doc.description;
            updateModalFavButton();
            
            const videoId = extractYouTubeId(doc.videoUrl);

            if (ytPlayer && ytPlayer.loadVideoById) {
                ytPlayer.loadVideoById(videoId);
            } else {
                ytPlayer = new YT.Player('yt-player-container', {
                    videoId: videoId,
                    playerVars: { 
                        'autoplay': 1, 
                        'playsinline': 1,
                        'rel': 0
                    },
                    events: {
                        'onStateChange': onPlayerStateChange
                    }
                });
            }

            const modal = document.getElementById('video-modal');
            const modalContent = document.getElementById('modal-content');
            modal.classList.remove('modal-enter');
            modal.classList.add('modal-enter-active');
            modalContent.classList.remove('modal-scale-enter');
            modalContent.classList.add('modal-scale-enter-active');
            document.body.classList.add('modal-open');
        }

        function onPlayerStateChange(event) {
            if (event.data === 0) { // 0 = จบ
                playNextVideo();
            }
        }

        function playNextVideo() {
            if (!currentPlaylist || currentPlaylist.length === 0) return;
            const currentIndex = currentPlaylist.findIndex(d => d.id === currentDocId);
            
            if (currentIndex !== -1 && currentIndex < currentPlaylist.length - 1) {
                const nextDoc = currentPlaylist[currentIndex + 1];
                openModal(nextDoc, currentPlaylist);
            }
        }

        function closeModal() {
            const modal = document.getElementById('video-modal');
            const modalContent = document.getElementById('modal-content');
            modal.classList.remove('modal-enter-active');
            modal.classList.add('modal-enter');
            modalContent.classList.remove('modal-scale-enter-active');
            modalContent.classList.add('modal-scale-enter');
            
            if (ytPlayer && ytPlayer.stopVideo) {
                ytPlayer.stopVideo();
            }
            
            if (!document.getElementById('fav-modal').classList.contains('modal-enter-active')) {
                document.body.classList.remove('modal-open');
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                if (document.getElementById('video-modal').classList.contains('modal-enter-active')) {
                    closeModal();
                } else if (document.getElementById('fav-modal').classList.contains('modal-enter-active')) {
                    closeFavoritesModal();
                }
            }
        });

        // --- 7. เริ่มต้นการทำงาน ---
        window.onload = loadData;

    </script>
</body>
</html>
