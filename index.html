<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoowolrd History - แกลอรีสารคดี</title>
    <!-- ใช้ Tailwind CSS สำหรับการออกแบบ UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* สไตล์สำหรับซ่อน/แสดง Modal ด้วยเอฟเฟกต์เฟด */
        .modal-enter {
            opacity: 0;
            pointer-events: none;
        }
        .modal-enter-active {
            opacity: 1;
            pointer-events: auto;
            transition: opacity 0.3s ease-out;
        }
        .modal-scale-enter {
            transform: scale(0.95);
        }
        .modal-scale-enter-active {
            transform: scale(1);
            transition: transform 0.3s ease-out;
        }
        
        body.modal-open {
            overflow: hidden;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* สไตล์หัวใจเวลาถูกเลือก */
        .fav-active {
            color: #10b981; /* emerald-500 */
            fill: currentColor;
        }
    </style>
</head>
<body class="text-gray-100 font-sans min-h-screen relative pb-20">

    <!-- พื้นหลังธรรมชาติสว่างที่โล่ง และ เงากระจกกึ่งโปร่งแสง (Frosted Glass) -->
    <div class="fixed inset-0 z-[-1] bg-[url('https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&q=80&w=2560')] bg-cover bg-center">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-lg shadow-inner"></div>
    </div>

    <!-- ส่วนหัว (Header) -->
    <header class="bg-gradient-to-b from-black/95 to-transparent fixed top-0 w-full z-40 transition-all duration-300 pb-2 sm:pb-4">
        <div class="w-full px-4 sm:px-8 py-3 flex flex-wrap sm:flex-nowrap items-center justify-between gap-3">
            <h1 class="text-xl sm:text-3xl font-bold flex items-center gap-2 drop-shadow-lg text-white cursor-pointer" onclick="goHome()">
                <svg class="w-6 h-6 sm:w-8 sm:h-8 text-emerald-500" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2L2 22h20L12 2zm0 3.8l7.5 14.2H4.5L12 5.8zM11 16h2v2h-2v-2zm0-7h2v5h-2V9z"/>
                </svg>
                HISTORY-<span class="text-gray-400 font-light">ZOOWORLD</span>
            </h1>
            
            <!-- กล่องค้นหา -->
            <div class="relative w-full sm:w-64 md:w-80 order-3 sm:order-none mt-2 sm:mt-0">
                <svg class="w-5 h-5 absolute left-3 top-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="search-input" placeholder="ค้นหาวิดีโอ..." class="w-full bg-gray-800/80 text-white px-4 py-2 pl-10 rounded-full border border-gray-700/50 focus:outline-none focus:border-emerald-500 focus:bg-gray-900 text-sm backdrop-blur-sm transition-colors shadow-inner">
            </div>

            <!-- กลุ่มปุ่มด้านบนขวา -->
            <div class="flex items-center gap-2">
                <div id="data-status" class="hidden sm:block text-[10px] sm:text-sm px-3 py-1.5 rounded bg-gray-800/80 text-gray-300 backdrop-blur-sm border border-gray-700/50 whitespace-nowrap">
                    กำลังโหลด...
                </div>
                
                <button onclick="refreshData()" class="p-2 bg-gray-800/80 border border-gray-700/50 rounded-full hover:bg-gray-700 transition-colors backdrop-blur-sm text-gray-300 hover:text-white" title="รีเฟรชข้อมูล">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>

                <button onclick="openFavoritesModal()" class="p-2 bg-gray-800/80 border border-gray-700/50 rounded-full hover:bg-gray-700 transition-colors backdrop-blur-sm text-gray-300 hover:text-white" title="รายการโปรด">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- คอนเทนต์หลัก -->
    <main class="w-full mx-auto pt-36 sm:pt-24 pb-12">
        
        <!-- แถบหมวดหมู่ (คลิกเพื่อเลื่อนไปยังสไลเดอร์นั้นๆ) -->
        <div id="category-bar" class="flex overflow-x-auto hide-scrollbar gap-2 px-4 sm:px-8 mb-6 pb-2">
            <!-- ปุ่มหมวดหมู่จะถูกสร้างด้วย JS -->
        </div>

        <!-- คอนเทนเนอร์สำหรับใส่สไลเดอร์ของแต่ละเพลย์ลิสต์ -->
        <div id="main-content-area" class="w-full">
            <!-- สไลเดอร์หมวดหมู่ต่างๆ จะถูกสร้างด้วย JS ตรงนี้ -->
        </div>

    </main>

    <!-- ปุ่มลอย (Floating Button) สำหรับค้นหาข้อมูลสัตว์โลก -->
    <button onclick="openKnowledgeModal()" class="fixed bottom-20 sm:bottom-24 right-4 sm:right-8 bg-emerald-600 hover:bg-emerald-700 text-white pl-4 pr-5 py-3 rounded-full shadow-[0_10px_25px_rgba(16,185,129,0.4)] z-40 flex items-center gap-2 transition-transform hover:scale-105 border border-emerald-400/50 group">
        <svg class="w-5 h-5 sm:w-6 sm:h-6 group-hover:rotate-12 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <span class="font-bold text-sm sm:text-base drop-shadow-md tracking-wide">ค้นหาข้อมูลสัตว์โลก</span>
    </button>

    <!-- แถบเมนูด้านล่าง -->
    <nav class="fixed bottom-0 w-full bg-black/90 backdrop-blur-xl border-t border-gray-800 z-40 flex justify-around py-3 px-2 shadow-[0_-10px_20px_rgba(0,0,0,0.5)]">
        <button onclick="goHome()" class="flex flex-col items-center gap-1 text-white hover:text-emerald-500 transition-colors flex-1">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[10px] font-medium">หน้าแรก</span>
        </button>
        <button onclick="openFavoritesModal()" class="flex flex-col items-center gap-1 text-gray-400 hover:text-emerald-500 transition-colors flex-1">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
            <span class="text-[10px] font-medium">รายการโปรด</span>
        </button>
    </nav>

    <!-- โครงสร้าง Dialog สำหรับเล่นวิดีโอ -->
    <div id="video-modal" class="fixed inset-0 z-50 flex items-center justify-center modal-enter" aria-modal="true" role="dialog">
        <div class="absolute inset-0 bg-black bg-opacity-90 backdrop-blur-sm" onclick="closeModal()"></div>
        <div id="modal-content" class="relative bg-gray-900 rounded-xl overflow-hidden shadow-2xl w-full max-w-5xl mx-0 sm:mx-4 modal-scale-enter border border-gray-800 h-full sm:h-auto flex flex-col">
            <div class="flex justify-between items-center p-3 sm:p-4 border-b border-gray-800 bg-black">
                <h2 id="modal-title" class="text-base sm:text-xl font-semibold text-white truncate pr-4 flex-1">ชื่อสารคดี</h2>
                <div class="flex items-center gap-2">
                    <button id="modal-fav-btn" onclick="toggleFavoriteFromModal()" class="text-gray-400 hover:text-emerald-500 transition-colors p-2 rounded-full hover:bg-gray-800" aria-label="เพิ่มลงรายการโปรด">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                    </button>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors p-2 bg-gray-800 hover:bg-gray-700 rounded-full" aria-label="ปิด">
                        <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            </div>
            <div class="relative w-full bg-black flex-shrink-0" style="padding-top: 56.25%;">
                <div id="yt-player-container" class="absolute top-0 left-0 w-full h-full"></div>
            </div>
            <div class="p-4 sm:p-6 bg-gray-900 text-gray-300 text-sm sm:text-base overflow-y-auto flex-1">
                <p id="modal-description" class="mb-4">รายละเอียดสารคดี...</p>
                <div class="flex items-center text-xs text-gray-500 gap-2 border-t border-gray-800 pt-4 mt-auto">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
                    เล่นอัตโนมัติเมื่อจบ (Auto-play Next)
                </div>
            </div>
        </div>
    </div>

    <!-- โครงสร้าง Dialog สำหรับ "รายการโปรด" -->
    <div id="fav-modal" class="fixed inset-0 z-50 flex items-center justify-center modal-enter" aria-modal="true" role="dialog">
        <div class="absolute inset-0 bg-black bg-opacity-90 backdrop-blur-sm" onclick="closeFavoritesModal()"></div>
        <div id="fav-modal-content" class="relative bg-gray-900 rounded-xl overflow-hidden shadow-2xl w-full max-w-6xl mx-0 sm:mx-4 modal-scale-enter border border-gray-800 h-[90vh] flex flex-col">
            <div class="flex justify-between items-center p-4 border-b border-gray-800 bg-black">
                <h2 class="text-xl font-bold text-white flex items-center gap-2">
                    <svg class="w-6 h-6 text-emerald-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    วิดีโอโปรดของคุณ
                </h2>
                <button onclick="closeFavoritesModal()" class="text-gray-400 hover:text-white p-2 bg-gray-800 hover:bg-gray-700 rounded-full">
                    <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-0 overflow-y-auto flex-1 bg-black/50">
                <div id="fav-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-0">
                    <!-- การ์ดรายการโปรดจะมาแสดงตรงนี้ -->
                </div>
            </div>
        </div>
    </div>

    <!-- โครงสร้าง Dialog สำหรับ "ข้อมูลสัตว์โลก (ค้นหาเว็บ _blank)" -->
    <div id="knowledge-modal" class="fixed inset-0 z-50 flex items-center justify-center modal-enter" aria-modal="true" role="dialog">
        <div class="absolute inset-0 bg-black bg-opacity-90 backdrop-blur-sm" onclick="closeKnowledgeModal()"></div>
        <div id="knowledge-modal-content" class="relative bg-gray-900 rounded-xl overflow-hidden shadow-2xl w-full max-w-6xl mx-0 sm:mx-4 modal-scale-enter border border-gray-800 h-[90vh] flex flex-col">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 border-b border-gray-800 bg-black gap-4 relative">
                <h2 class="text-xl font-bold text-white flex items-center gap-2 pr-10 sm:pr-0">
                    <svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    ค้นหาข้อมูลสัตว์โลก
                </h2>
                <div class="relative w-full sm:w-64 order-3 sm:order-none">
                    <svg class="w-5 h-5 absolute left-3 top-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="knowledge-search-input" placeholder="ค้นหาชื่อสัตว์..." class="w-full bg-gray-800 text-white px-4 py-2 pl-10 rounded-full border border-gray-700 focus:outline-none focus:border-emerald-500 focus:bg-gray-700 text-sm transition-colors shadow-inner">
                </div>
                <button onclick="closeKnowledgeModal()" class="absolute top-4 right-4 sm:relative sm:top-auto sm:right-auto text-gray-400 hover:text-white p-2 bg-gray-800 hover:bg-gray-700 rounded-full">
                    <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-0 overflow-y-auto flex-1 bg-black/50 flex flex-col">
                <div id="knowledge-modal-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-0">
                    <!-- การ์ดรายการจะมาแสดงตรงนี้ -->
                </div>
                <div id="knowledge-modal-pagination" class="flex justify-center items-center gap-2 mt-auto py-6"></div>
            </div>
        </div>
    </div>

    <!-- โหลด YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let isYTReady = false;
        let previewPlayer = null;
        let previewTimeout = null;
        let currentPreviewDoc = null;

        function onYouTubeIframeAPIReady() {
            isYTReady = true;
            startPreviewPlayer();
        }

        // =====================================================================
        // การตั้งค่าเพลย์ลิสต์ YouTube (สามารถเพิ่มหลาย URL ต่อกันได้)
        // =====================================================================
        const YOUTUBE_PLAYLISTS = [
            "https://www.youtube.com/playlist?list=PLoQ0EVnVVXcli4zP6xIsvEeboE3qxnBGX", 
            "https://www.youtube.com/watch?v=WMgvGmR1qm8&list=PLoQ0EVnVVXck4C8lirYz5sWgTS5YnvMpH", // ตัวอย่างใส่เพิ่มได้เรื่อยๆ
        ];

        // ฟังก์ชันช่วยดึง Playlist ID
        function extractPlaylistId(url) {
            const reg = /[?&]list=([^#\&\?]+)/;
            const match = url.match(reg);
            return match ? match[1] : null;
        }

        // --- ข้อมูลสำหรับปุ่มลอย (ค้นหาข้อมูลสัตว์) ---
        const knowledgeData = [
            { id: "k1", title: "ฉลามขาว (Great White Shark)", description: "นักล่าแห่งท้องทะเลที่มีฟันคมกริบ", thumbnail: "https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&q=80&w=800", linkUrl: "https://www.google.com/search?q=ฉลามขาว+Great+White+Shark" },
            { id: "k2", title: "จระเข้น้ำเค็ม (Saltwater Crocodile)", description: "สัตว์เลื้อยคลานที่ใหญ่ที่สุดในโลก", thumbnail: "https://images.unsplash.com/photo-1517036640879-11ba188f6217?auto=format&fit=crop&q=80&w=800", linkUrl: "https://www.google.com/search?q=จระเข้น้ำเค็ม+Saltwater+Crocodile" },
            { id: "k3", title: "งูไทปันโพ้นทะเล (Inland Taipan)", description: "งูที่มีพิษร้ายแรงที่สุดในโลก", thumbnail: "https://images.unsplash.com/photo-1534759846116-5799c33ce22a?auto=format&fit=crop&q=80&w=800", linkUrl: "https://www.google.com/search?q=งูไทปันโพ้นทะเล+Inland+Taipan" },
            { id: "k4", title: "แมงกะพรุนกล่อง (Box Jellyfish)", description: "สัตว์ทะเลที่โปร่งใสแต่มีเข็มพิษร้ายแรง", thumbnail: "https://images.unsplash.com/photo-1549480017-d76466a4b7e8?auto=format&fit=crop&q=80&w=800", linkUrl: "https://www.google.com/search?q=แมงกะพรุนกล่อง+Box+Jellyfish" },
            { id: "k5", title: "สิงโต (Lion)", description: "เจ้าป่าแห่งสะวันนา", thumbnail: "https://images.unsplash.com/photo-1517825738774-7de9363ef735?auto=format&fit=crop&q=80&w=800", linkUrl: "https://www.google.com/search?q=สิงโต+Lion" },
            { id: "k6", title: "ฮิปโปโปเตมัส (Hippopotamus)", description: "สัตว์ที่ดุร้ายและปกป้องอาณาเขตอย่างหวงแหน", thumbnail: "https://images.unsplash.com/photo-1537025805562-b1db97ffc649?auto=format&fit=crop&q=80&w=800", linkUrl: "https://www.google.com/search?q=ฮิปโปโปเตมัส+Hippopotamus" },
            { id: "k7", title: "ช้างแอฟริกา (African Elephant)", description: "สัตว์บกที่ใหญ่ที่สุดในโลก", thumbnail: "https://images.unsplash.com/photo-1557050543-4d5f4e07ef46?auto=format&fit=crop&q=80&w=800", linkUrl: "https://www.google.com/search?q=ช้างแอฟริกา+African+Elephant" },
            { id: "k8", title: "เสือโคร่ง (Bengal Tiger)", description: "นักล่าสันโดษที่ทรงพลัง", thumbnail: "https://images.unsplash.com/photo-1500403668705-d5ab797a7a9e?auto=format&fit=crop&q=80&w=800", linkUrl: "https://www.google.com/search?q=เสือโคร่ง+Bengal+Tiger" },
            { id: "k9", title: "หมีขั้วโลก (Polar Bear)", description: "นักล่าบนยอดสุดของห่วงโซ่อาหารในแถบอาร์กติก", thumbnail: "https://images.unsplash.com/photo-1518205739023-7a91512db16b?auto=format&fit=crop&q=80&w=800", linkUrl: "https://www.google.com/search?q=หมีขั้วโลก+Polar+Bear" },
            { id: "k10", title: "เพนกวินจักรพรรดิ (Emperor Penguin)", description: "นกที่ทนความหนาวเย็นได้ดีที่สุด", thumbnail: "https://images.unsplash.com/photo-1598439210625-5067c578f3f6?auto=format&fit=crop&q=80&w=800", linkUrl: "https://www.google.com/search?q=เพนกวินจักรพรรดิ+Emperor+Penguin" }
        ];

        let documentaries = [];
        let currentPlaylist = []; 
        let currentDocId = null;  

        // ตัวแปรสถานะ
        let searchQuery = "";
        let currentCategory = "ทั้งหมด";
        let categoriesList = ["ทั้งหมด"];
        let autoSlideTimer = null;
        
        let knowledgeSearchQuery = "";
        let knowledgeCurrentPage = 1;
        const knowledgeItemsPerPage = 10; 
        let ytPlayer = null;

        // --- 2. โหลดข้อมูลวิดีโอจาก YouTube เพลย์ลิสต์หลายๆ ลิงก์ ---
        async function loadData() {
            const statusEl = document.getElementById('data-status');
            statusEl.textContent = 'กำลังโหลดวิดีโอ...';
            documentaries = [];

            try {
                // ยิงคำขอไปดึงข้อมูลทุกเพลย์ลิสต์พร้อมกัน
                const fetchPromises = YOUTUBE_PLAYLISTS.map(async (url) => {
                    const playlistId = extractPlaylistId(url);
                    if (!playlistId) return [];

                    const rssUrl = encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?playlist_id=${playlistId}`);
                    const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
                    const data = await response.json();
                    
                    if (data.status === 'ok' && data.items.length > 0) {
                        // ใช้ชื่อเพลย์ลิสต์ตั้งเป็นชื่อหมวดหมู่เลย
                        const playlistTitle = data.feed.title || "วิดีโอจากเพลย์ลิสต์";
                        
                        return data.items.map((item, index) => {
                            const videoId = extractYouTubeId(item.link);
                            return {
                                id: `yt_${videoId}_${playlistId}_${index}`,
                                category: playlistTitle,
                                title: item.title,
                                description: `รับชมวิดีโอจาก: ${playlistTitle}`,
                                thumbnail: `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`, // ใช้รูปปก YouTube
                                videoUrl: item.link
                            };
                        });
                    }
                    return [];
                });

                // รอให้ทุกเพลย์ลิสต์โหลดเสร็จ แล้วนำมารวมกัน
                const results = await Promise.all(fetchPromises);
                results.forEach(items => {
                    documentaries = documentaries.concat(items);
                });

                if (documentaries.length > 0) {
                    statusEl.textContent = 'ดึงข้อมูลสำเร็จ';
                    statusEl.className = 'hidden sm:block text-[10px] sm:text-sm px-3 py-1.5 rounded bg-emerald-900/80 text-emerald-300 backdrop-blur-sm border border-emerald-700/50';
                } else {
                    throw new Error("ไม่มีข้อมูล");
                }
            } catch(error) {
                console.error("โหลดข้อมูลล้มเหลว: ", error);
                documentaries = []; // ล้างข้อมูลหากดึงไม่สำเร็จ
                statusEl.textContent = 'โหลดข้อมูลล้มเหลว';
                statusEl.className = 'hidden sm:block text-[10px] sm:text-sm px-3 py-1.5 rounded bg-red-900/80 text-red-300 backdrop-blur-sm border border-red-700/50';
            }
            
            extractCategories(); 
            renderAll();
        }

        function extractCategories() {
            // ดึงชื่อหมวดหมู่ที่ไม่ซ้ำกัน
            const cats = new Set(documentaries.map(d => d.category && d.category.trim() ? d.category.trim() : 'วิดีโออื่นๆ'));
            categoriesList = ["ทั้งหมด", ...Array.from(cats)];
            renderCategoryBar();
        }

        function renderCategoryBar() {
            const bar = document.getElementById('category-bar');
            if (!bar) return;
            bar.innerHTML = categoriesList.map(cat => `
                <button onclick="setCategory('${cat}')" class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors border border-gray-700/50 ${currentCategory === cat ? 'bg-emerald-600 text-white border-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.3)]' : 'bg-gray-800/80 text-gray-300 hover:bg-gray-700 backdrop-blur-sm'}">
                    ${cat}
                </button>
            `).join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            renderCategoryBar();
            renderAll();
        }

        function refreshData() {
            document.getElementById('search-input').value = "";
            searchQuery = "";
            currentCategory = "ทั้งหมด";
            loadData();
        }

        function goHome() {
            closeFavoritesModal();
            closeKnowledgeModal();
            closeModal();
            currentCategory = "ทั้งหมด";
            renderCategoryBar();
            renderAll();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderAll();
        });

        // --- 3. ฟังก์ชัน Render หลัก (เปลี่ยนเป็นสไลเดอร์ทั้งหมด) ---
        function renderAll() {
            const mainContainer = document.getElementById('main-content-area');
            mainContainer.innerHTML = ''; // ล้างข้อมูลเก่า
            currentPreviewDoc = null; // รีเซ็ตวิดีโอตัวอย่าง
            
            let filteredDocs = documentaries;

            // กรณีค้นหา
            if (searchQuery) {
                filteredDocs = filteredDocs.filter(doc => 
                    doc.title.toLowerCase().includes(searchQuery) || 
                    doc.description.toLowerCase().includes(searchQuery)
                );
                
                mainContainer.innerHTML = `
                    <h2 class="text-lg sm:text-xl font-bold mb-4 px-4 sm:px-8 text-emerald-400">ผลการค้นหา: "${searchQuery}" (${filteredDocs.length} รายการ)</h2>
                    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-0 px-0 sm:px-8">
                        ${filteredDocs.map(doc => createCardHTML(doc, filteredDocs, false)).join('')}
                    </div>
                `;
                return; // จบการทำงาน
            }

            // กรณีเลือกหมวดหมู่ใดหมวดหมู่หนึ่ง หรือทั้งหมด
            const catsToRender = currentCategory === "ทั้งหมด" 
                ? categoriesList.filter(c => c !== "ทั้งหมด") 
                : [currentCategory];

            catsToRender.forEach(cat => {
                const catDocs = documentaries.filter(doc => (doc.category || 'วิดีโออื่นๆ').trim() === cat);
                if (catDocs.length > 0) {
                    renderCategorySlider(cat, catDocs, mainContainer);
                }
            });
            
            // ให้เริ่มเล่นวิดีโอตัวอย่างคลิปแรกของหน้า
            setTimeout(startPreviewPlayer, 100);
            startAutoSlide();
        }

        // ฟังก์ชันสร้างสไลเดอร์แต่ละหมวดหมู่ (แนว Netflix)
        function renderCategorySlider(categoryName, docs, container) {
            // สร้าง ID สุ่มเพื่อให้ปุ่มเลื่อนทำงานได้ถูกสไลเดอร์
            const safeId = "slider-" + Math.random().toString(36).substr(2, 9);
            
            const section = document.createElement('section');
            section.className = "mb-10 relative group px-0 sm:px-8";
            
            const sliderHtml = `
                <h2 class="text-lg sm:text-xl font-bold mb-3 px-4 sm:px-0 flex items-center gap-2 text-white">
                    <svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    ${categoryName}
                </h2>
                
                <button onclick="scrollSlider('${safeId}', -1)" class="hidden md:flex absolute left-0 sm:left-4 top-[2rem] bottom-0 z-30 bg-black/60 hover:bg-black/90 text-white w-12 items-center justify-center transition-all focus:outline-none opacity-0 group-hover:opacity-100 rounded-r-xl">
                    <svg class="w-8 h-8 transform -translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                
                <div id="${safeId}" class="flex overflow-x-auto snap-x snap-mandatory gap-0 hide-scrollbar scroll-smooth px-0 sm:px-0 pb-2">
                    ${docs.map((doc, idx) => {
                        // กำหนดวิดีโอตัวอย่างให้คลิปแรกสุดของเว็บเท่านั้น
                        const isGlobalFirst = (currentPreviewDoc === null);
                        if (isGlobalFirst) currentPreviewDoc = doc;
                        return createCardHTML(doc, docs, true, isGlobalFirst ? 0 : -1);
                    }).join('')}
                </div>
                
                <button onclick="scrollSlider('${safeId}', 1)" class="hidden md:flex absolute right-0 sm:right-4 top-[2rem] bottom-0 z-30 bg-black/60 hover:bg-black/90 text-white w-12 items-center justify-center transition-all focus:outline-none opacity-0 group-hover:opacity-100 rounded-l-xl">
                    <svg class="w-8 h-8 transform translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            `;
            section.innerHTML = sliderHtml;
            container.appendChild(section);
        }

        // ฟังก์ชันสร้างการ์ดวิดีโอ
        function createCardHTML(doc, playlistJson, isSlider = false, index = -1) {
            const wrapperClass = isSlider 
                ? "flex-none w-[85vw] sm:w-[320px] md:w-[400px] lg:w-[480px] snap-start relative aspect-video cursor-pointer group overflow-hidden bg-gray-900 border-r border-black"
                : "w-full relative aspect-video cursor-pointer group overflow-hidden bg-gray-900 border border-black"; 

            const isFav = isFavorite(doc.id);
            const favBadge = isFav ? `<div class="absolute top-2 left-2 z-40 text-emerald-500 drop-shadow-md"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>` : '';

            const isFirstSlider = isSlider && index === 0;
            const thumbIdAttr = isFirstSlider ? `id="preview-thumbnail"` : '';
            const previewContainer = isFirstSlider ? `<div id="preview-player-container" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[150%] h-[150%] z-0 pointer-events-none"></div>` : '';

            const encodedDoc = encodeURIComponent(JSON.stringify(doc));
            const encodedPlaylist = encodeURIComponent(JSON.stringify(playlistJson));

            return `
                <div class="${wrapperClass}" onclick="openModalFromEncoded('${encodedDoc}', '${encodedPlaylist}')">
                    ${favBadge}
                    
                    ${previewContainer}
                    <img ${thumbIdAttr} src="${doc.thumbnail}" alt="${doc.title}" class="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-700 z-10" loading="lazy">
                    
                    <div class="absolute inset-0 bg-gradient-to-t from-black/95 via-black/40 to-transparent z-20 pointer-events-none"></div>
                    
                    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-30">
                        <div class="bg-white/10 backdrop-blur-sm rounded-full p-3 shadow-[0_0_20px_rgba(0,0,0,0.5)] transform scale-75 group-hover:scale-100 transition-transform duration-300 border border-white/20 flex items-center justify-center">
                            <svg class="w-8 h-8 text-white ml-1 drop-shadow-lg" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    
                    <div class="absolute bottom-0 left-0 right-0 p-3 sm:p-4 z-40 transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300 bg-gradient-to-t from-black/80 to-transparent">
                        <h3 class="text-sm sm:text-base lg:text-lg font-bold text-white mb-0.5 drop-shadow-md line-clamp-1">${doc.title}</h3>
                        <p class="text-gray-300 text-[10px] sm:text-xs line-clamp-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 delay-75">${doc.description}</p>
                    </div>
                </div>
            `;
        }

        // ฟังก์ชันเลื่อนสไลเดอร์โดยอ้างอิงจาก ID แบบ Dynamic
        function scrollSlider(containerId, direction) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const itemWidth = window.innerWidth < 640 ? window.innerWidth * 0.85 : window.innerWidth < 1024 ? 400 : 480;
            container.scrollBy({ left: itemWidth * direction, behavior: 'smooth' });
        }

        function startAutoSlide() {
            if (autoSlideTimer) clearInterval(autoSlideTimer);
            autoSlideTimer = setInterval(() => {
                // เลื่อนสไลเดอร์อันแรกแบบอัตโนมัติ
                const firstSlider = document.querySelector('[id^="slider-"]');
                if (!firstSlider) return;
                
                if (Math.ceil(firstSlider.scrollLeft + firstSlider.clientWidth) >= (firstSlider.scrollWidth - 10)) {
                    firstSlider.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    const itemWidth = window.innerWidth < 640 ? window.innerWidth * 0.85 : window.innerWidth < 1024 ? 400 : 480;
                    firstSlider.scrollBy({ left: itemWidth, behavior: 'smooth' });
                }
            }, 10000);
        }

        // --- ส่วน Modal ค้นหาข้อมูลสัตว์โลก (External Links) ---
        function openKnowledgeModal() {
            if (document.getElementById('video-modal').classList.contains('modal-enter-active')) closeModal();
            if (document.getElementById('fav-modal').classList.contains('modal-enter-active')) closeFavoritesModal();

            knowledgeSearchQuery = "";
            document.getElementById('knowledge-search-input').value = "";
            knowledgeCurrentPage = 1;
            renderKnowledgeModalGrid();

            const modal = document.getElementById('knowledge-modal');
            const modalContent = document.getElementById('knowledge-modal-content');
            modal.classList.remove('modal-enter');
            modal.classList.add('modal-enter-active');
            modalContent.classList.remove('modal-scale-enter');
            modalContent.classList.add('modal-scale-enter-active');
            document.body.classList.add('modal-open');
        }

        function closeKnowledgeModal() {
            const modal = document.getElementById('knowledge-modal');
            const modalContent = document.getElementById('knowledge-modal-content');
            modal.classList.remove('modal-enter-active');
            modal.classList.add('modal-enter');
            modalContent.classList.remove('modal-scale-enter-active');
            modalContent.classList.add('modal-scale-enter');
            document.body.classList.remove('modal-open');
        }

        document.getElementById('knowledge-search-input').addEventListener('input', (e) => {
            knowledgeSearchQuery = e.target.value.toLowerCase();
            knowledgeCurrentPage = 1;
            renderKnowledgeModalGrid();
        });

        function renderKnowledgeModalGrid() {
            const grid = document.getElementById('knowledge-modal-grid');
            
            let filteredDocs = knowledgeData;
            if (knowledgeSearchQuery) {
                filteredDocs = knowledgeData.filter(doc => 
                    doc.title.toLowerCase().includes(knowledgeSearchQuery) || 
                    doc.description.toLowerCase().includes(knowledgeSearchQuery)
                );
            }

            const startIndex = (knowledgeCurrentPage - 1) * knowledgeItemsPerPage;
            const endIndex = startIndex + knowledgeItemsPerPage;
            const paginatedDocs = filteredDocs.slice(startIndex, endIndex);
            
            if (filteredDocs.length === 0) {
                grid.innerHTML = '<div class="col-span-full flex justify-center py-20 text-gray-500"><p class="text-lg">ไม่พบข้อมูลสัตว์ที่คุณค้นหา</p></div>';
            } else {
                grid.innerHTML = paginatedDocs.map(doc => createKnowledgeCardHTML(doc)).join('');
            }
            renderKnowledgeModalPagination(filteredDocs.length);
        }

        function createKnowledgeCardHTML(doc) {
            const wrapperClass = "w-full relative aspect-video cursor-pointer group overflow-hidden bg-gray-900 border border-black block"; 
            
            return `
                <a href="${doc.linkUrl}" target="_blank" rel="noopener noreferrer" class="${wrapperClass}">
                    <img src="${doc.thumbnail}" alt="${doc.title}" class="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-700 z-10" loading="lazy">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/95 via-black/40 to-transparent z-20 pointer-events-none"></div>
                    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-30">
                        <div class="bg-white/10 backdrop-blur-sm rounded-full p-3 shadow-[0_0_20px_rgba(0,0,0,0.5)] transform scale-75 group-hover:scale-100 transition-transform duration-300 border border-white/20">
                            <svg class="w-8 h-8 text-white drop-shadow-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        </div>
                    </div>
                    <div class="absolute bottom-0 left-0 right-0 p-3 sm:p-5 z-40 transform translate-y-2 sm:translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
                        <h3 class="text-sm sm:text-lg lg:text-xl font-bold text-white mb-1 drop-shadow-md line-clamp-1">${doc.title}</h3>
                        <p class="text-gray-300 text-[10px] sm:text-xs lg:text-sm line-clamp-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300 delay-75">${doc.description}</p>
                    </div>
                </a>
            `;
        }

        // ปุ่มแบ่งหน้า สำหรับข้อมูลสัตว์โลก (Modal)
        function renderKnowledgeModalPagination(totalItems) {
            const totalPages = Math.ceil(totalItems / knowledgeItemsPerPage);
            const container = document.getElementById('knowledge-modal-pagination');
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            
            let html = `<button onclick="changeKnowledgeModalPage(${knowledgeCurrentPage - 1})" class="px-4 py-2 bg-gray-900 border border-gray-700 text-white rounded hover:bg-emerald-600 disabled:opacity-30 transition-colors flex items-center gap-1" ${knowledgeCurrentPage === 1 ? 'disabled' : ''}>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            ก่อนหน้า
                        </button>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<button onclick="changeKnowledgeModalPage(${i})" class="px-4 py-2 border border-gray-700 rounded transition-colors ${knowledgeCurrentPage === i ? 'bg-emerald-600 text-white font-bold' : 'bg-gray-900 text-gray-400 hover:bg-gray-700 hover:text-white'}">${i}</button>`;
            }
            html += `<button onclick="changeKnowledgeModalPage(${knowledgeCurrentPage + 1})" class="px-4 py-2 bg-gray-900 border border-gray-700 text-white rounded hover:bg-emerald-600 disabled:opacity-30 transition-colors flex items-center gap-1" ${knowledgeCurrentPage === totalPages ? 'disabled' : ''}>
                        ถัดไป
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>`;
            container.innerHTML = html;
        }

        function changeKnowledgeModalPage(page) {
            knowledgeCurrentPage = page;
            renderKnowledgeModalGrid();
            const modalContent = document.getElementById('knowledge-modal-content');
            const scrollableArea = modalContent.querySelector('.overflow-y-auto');
            if (scrollableArea) scrollableArea.scrollTo({ top: 0, behavior: 'smooth' });
        }


        // --- 4. ระบบตัวอย่างวิดีโอ (Preview) ---
        function startPreviewPlayer() {
            if (!isYTReady || !currentPreviewDoc) return;
            const container = document.getElementById('preview-player-container');
            if (!container) return;

            if (previewPlayer) {
                previewPlayer.destroy();
                previewPlayer = null;
            }

            const videoId = extractYouTubeId(currentPreviewDoc.videoUrl);

            previewPlayer = new YT.Player('preview-player-container', {
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'mute': 1, 
                    'playsinline': 1,
                    'rel': 0,
                    'modestbranding': 1,
                    'showinfo': 0,
                    'disablekb': 1,
                    'fs': 0,
                    'iv_load_policy': 3
                },
                events: {
                    'onReady': (event) => {
                        event.target.mute(); 
                        event.target.playVideo();
                    },
                    'onStateChange': (event) => {
                        const thumb = document.getElementById('preview-thumbnail');
                        if (event.data === YT.PlayerState.PLAYING) {
                            if (thumb) thumb.style.opacity = '0'; 
                            
                            clearTimeout(previewTimeout);
                            previewTimeout = setTimeout(() => {
                                if (previewPlayer && previewPlayer.pauseVideo) {
                                    previewPlayer.pauseVideo();
                                    if (thumb) thumb.style.opacity = '0.8'; 
                                }
                            }, 5000); 
                        }
                    }
                }
            });
        }

        // --- 5. ระบบรายการโปรด (Local Storage) ---
        function getFavorites() {
            const favs = localStorage.getItem('documentary_favorites');
            return favs ? JSON.parse(favs) : [];
        }

        function isFavorite(id) {
            return getFavorites().includes(id);
        }

        function toggleFavoriteFromModal() {
            if (!currentDocId) return;
            
            let favs = getFavorites();
            if (favs.includes(currentDocId)) {
                favs = favs.filter(id => id !== currentDocId);
            } else {
                favs.push(currentDocId);
            }
            localStorage.setItem('documentary_favorites', JSON.stringify(favs));
            
            updateModalFavButton();
            renderAll(); 
            
            if (document.getElementById('fav-modal').classList.contains('modal-enter-active')) {
                renderFavoritesDialog();
            }
        }

        function updateModalFavButton() {
            const btn = document.getElementById('modal-fav-btn');
            if (isFavorite(currentDocId)) {
                btn.innerHTML = `<svg class="w-6 h-6 fav-active" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
            } else {
                btn.innerHTML = `<svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>`;
            }
        }

        function openFavoritesModal() {
            renderFavoritesDialog();
            const modal = document.getElementById('fav-modal');
            const modalContent = document.getElementById('fav-modal-content');
            modal.classList.remove('modal-enter');
            modal.classList.add('modal-enter-active');
            modalContent.classList.remove('modal-scale-enter');
            modalContent.classList.add('modal-scale-enter-active');
            document.body.classList.add('modal-open');
        }

        function closeFavoritesModal() {
            const modal = document.getElementById('fav-modal');
            const modalContent = document.getElementById('fav-modal-content');
            modal.classList.remove('modal-enter-active');
            modal.classList.add('modal-enter');
            modalContent.classList.remove('modal-scale-enter-active');
            modalContent.classList.add('modal-scale-enter');
            if (!document.getElementById('video-modal').classList.contains('modal-enter-active') && !document.getElementById('knowledge-modal').classList.contains('modal-enter-active')) {
                document.body.classList.remove('modal-open');
            }
        }

        function renderFavoritesDialog() {
            const favIds = getFavorites();
            const favDocs = documentaries.filter(doc => favIds.includes(doc.id));
            
            const grid = document.getElementById('fav-grid');
            
            if (favDocs.length === 0) {
                grid.innerHTML = '<div class="col-span-full flex flex-col items-center justify-center py-20 text-gray-500"><svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg><p>ยังไม่มีรายการโปรด</p></div>';
            } else {
                // รายการโปรดจะแสดงเป็นตารางปกติ
                grid.innerHTML = favDocs.map((doc, idx) => createCardHTML(doc, favDocs, false, idx)).join('');
            }
        }

        // --- 6. ฟังก์ชันควบคุมการเล่นวิดีโอ (YouTube API) ---
        function extractYouTubeId(url) {
            if (!url) return 'GfO-HzE1I18'; 
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : 'GfO-HzE1I18';
        }

        function openModalFromEncoded(encodedDoc, encodedPlaylist) {
            const doc = JSON.parse(decodeURIComponent(encodedDoc));
            const playlist = JSON.parse(decodeURIComponent(encodedPlaylist));
            openModal(doc, playlist);
        }

        function openModal(doc, playlist) {
            if (document.getElementById('fav-modal').classList.contains('modal-enter-active')) {
                closeFavoritesModal();
            }

            if (previewPlayer && previewPlayer.pauseVideo) {
                previewPlayer.pauseVideo();
                const thumb = document.getElementById('preview-thumbnail');
                if(thumb) thumb.style.opacity = '0.8';
            }

            currentDocId = doc.id;
            currentPlaylist = playlist || documentaries;
            
            document.getElementById('modal-title').textContent = doc.title;
            document.getElementById('modal-description').textContent = doc.description;
            updateModalFavButton();
            
            const videoId = extractYouTubeId(doc.videoUrl);

            if (ytPlayer && ytPlayer.loadVideoById) {
                ytPlayer.loadVideoById(videoId);
            } else {
                ytPlayer = new YT.Player('yt-player-container', {
                    videoId: videoId,
                    playerVars: { 
                        'autoplay': 1, 
                        'playsinline': 1,
                        'rel': 0
                    },
                    events: {
                        'onStateChange': onPlayerStateChange
                    }
                });
            }

            const modal = document.getElementById('video-modal');
            const modalContent = document.getElementById('modal-content');
            modal.classList.remove('modal-enter');
            modal.classList.add('modal-enter-active');
            modalContent.classList.remove('modal-scale-enter');
            modalContent.classList.add('modal-scale-enter-active');
            document.body.classList.add('modal-open');
        }

        function onPlayerStateChange(event) {
            if (event.data === 0) { // 0 = จบ
                playNextVideo();
            }
        }

        function playNextVideo() {
            if (!currentPlaylist || currentPlaylist.length === 0) return;
            const currentIndex = currentPlaylist.findIndex(d => d.id === currentDocId);
            
            if (currentIndex !== -1 && currentIndex < currentPlaylist.length - 1) {
                const nextDoc = currentPlaylist[currentIndex + 1];
                openModal(nextDoc, currentPlaylist);
            }
        }

        function closeModal() {
            const modal = document.getElementById('video-modal');
            const modalContent = document.getElementById('modal-content');
            modal.classList.remove('modal-enter-active');
            modal.classList.add('modal-enter');
            modalContent.classList.remove('modal-scale-enter-active');
            modalContent.classList.add('modal-scale-enter');
            
            if (ytPlayer && ytPlayer.stopVideo) {
                ytPlayer.stopVideo();
            }
            
            if (!document.getElementById('fav-modal').classList.contains('modal-enter-active') && !document.getElementById('knowledge-modal').classList.contains('modal-enter-active')) {
                document.body.classList.remove('modal-open');
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                if (document.getElementById('video-modal').classList.contains('modal-enter-active')) {
                    closeModal();
                } else if (document.getElementById('fav-modal').classList.contains('modal-enter-active')) {
                    closeFavoritesModal();
                } else if (document.getElementById('knowledge-modal').classList.contains('modal-enter-active')) {
                    closeKnowledgeModal();
                }
            }
        });

        // --- 7. เริ่มต้นการทำงาน ---
        window.onload = loadData;

    </script>
</body>
</html>
